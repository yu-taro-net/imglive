<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>imglive - Adventure RPG</title>
  <script src="https://satisfied-nourishment-production.up.railway.app/socket.io/socket.io.js"></script>
  <style>
    /* --- 基本レイアウト --- */
    body {
      margin: 0;
      background-color: #020617;
      color: white;
      font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* --- ゲーム画面 (Canvas) --- */
    #stage {
      background-color: #1e293b;
      border: 4px solid #334155;
      border-radius: 12px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      width: 800px;
      height: 600px;
      cursor: crosshair;
    }

    /* --- UIコンテナ (チャット・操作系) --- */
    #ui-container {
      margin-top: 20px;
      width: 800px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-row {
      display: flex;
      gap: 8px;
    }

    #chat-mode {
      background: rgba(0,0,0,0.7);
      color: #60a5fa;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 5px;
      cursor: pointer;
    }

    #chat-in {
      flex-grow: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      outline: none;
      font-size: 14px;
    }

    #msg-box {
      height: 80px;
      overflow-y: auto;
      background: rgba(30, 41, 59, 0.5);
      padding: 10px;
      font-size: 13px;
      border-radius: 8px;
      border-left: 4px solid #60a5fa;
    }

    /* --- チャンネルボタン --- */
    .channel-box {
      margin-top: 10px;
      border-top: 1px solid #334155;
      padding-top: 10px;
    }
    
    .channel-box button {
      background: #1e293b;
      border: 1px solid #444;
      color: #ccc;
      padding: 5px 15px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 5px;
      transition: 0.2s;
    }

    .channel-box button:hover {
      background: #334155;
      color: white;
    }
	
	/* 現在のチャンネルボタンのスタイル */
.channel-box button.active {
    background-color: #fbbf24; /* メイプル風の黄色 */
    color: #000;
    font-weight: bold;
    border: 2px solid #d97706;
    box-shadow: 0 0 5px rgba(251, 191, 36, 0.8);
}

    /* --- ログインオーバーレイ (モーダル) --- */
    #login-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle, #222 0%, #050505 100%);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: rgba(30, 30, 30, 0.9);
      padding: 40px;
      border: 1px solid #333;
      border-radius: 15px;
      text-align: center;
      min-width: 320px;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
    }

    .login-card h2 {
      font-family: sans-serif;
      letter-spacing: 4px;
      color: #fff;
      text-shadow: 0 0 10px rgba(0,255,204,0.5);
      font-weight: lighter;
      margin-bottom: 30px;
    }

    .login-input {
      padding: 12px;
      font-size: 18px;
      border-radius: 5px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #fff;
      width: 220px;
      text-align: center;
      outline: none;
      margin-bottom: 15px;
      font-family: 'Courier New', monospace;
      transition: 0.3s;
    }

    .login-input:focus {
      border-color: #00ffcc;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
    }

    .ch-btn-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .ch-btn {
      background: rgba(30, 30, 30, 0.8);
      border: 1px solid #444;
      color: #888;
      padding: 10px 0;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
    }

    .ch-btn.active {
      border-color: #00ffcc;
      color: #00ffcc;
      background: rgba(0, 255, 204, 0.1);
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .primary-btn {
      flex: 1;
      padding: 12px;
      background: transparent;
      color: #00ffcc;
      border: 1px solid #00ffcc;
      border-radius: 5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .primary-btn:hover {
      background: rgba(0, 255, 204, 0.1);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
    }

    /* --- アイテムドロップ用フォーム --- */
    #drop-form {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 20px;
      border: 2px solid #fff;
      border-radius: 10px;
      z-index: 1000;
      text-align: center;
    }

    /* --- 装備中(Eマーク)用CSS (追加分) --- */
    .inventory-slot.equipped {
      border: 2px solid gold !important;
    }
	
	.confirm-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5); /* 背景を暗くする */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50001;
}

.confirm-box {
    background: #333;
    border: 2px solid #eee;
    border-radius: 10px;
    padding: 20px;
    width: 280px;
    text-align: center;
    color: white;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.confirm-buttons {
    margin-top: 15px;
    display: flex;
    justify-content: space-around;
}

.confirm-buttons button {
    padding: 5px 20px;
    cursor: pointer;
    border-radius: 5px;
    border: none;
    font-weight: bold;
}

#confirm-yes { background: #ffcc00; color: #000; }
#confirm-no { background: #888; color: #fff; }

#confirm-yes:hover { background: #ffea00; }

#tooltip-layer {
    position: fixed;      /* 画面の決まった位置に固定します */
    top: 0;               /* 一番上から */
    left: 0;              /* 一番左から */
    width: 100vw;         /* 画面の横幅いっぱい */
    height: 100vh;        /* 画面の縦幅いっぱい */
    z-index: 50000;       /* 💡 ここが重要！ショップより大きい数字にして一番手前にします */
    pointer-events: none; /* 💡 これがないと下のボタンが押せなくなるので必須です */
}

#shop-overlay {
    z-index: 10000; /* 💡 ツールチップ(99999)より低く設定 */
}

  </style>
</head>
<body>
<div id="whisper-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:3000;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:#1a1a1a; padding:20px; border:2px solid #2e7d32; border-radius:10px; text-align:center; color:white; min-width:300px; box-shadow: 0 0 20px rgba(46, 125, 50, 0.4);">
        <h3 style="margin-top:0; color:#4caf50;">内緒話の相手</h3>
        <p style="font-size: 14px; margin-bottom: 10px;">相手の名前を入力してください</p>
        
        <input type="text" id="whisper-target-name" placeholder="名前を入力..." 
               style="width:80%; padding:10px; margin-bottom:15px; background:#000; color:white; border:1px solid #2e7d32; border-radius:5px; outline: none;">
        
        <div id="whisper-error" style="color: #ff5252; font-size: 12px; margin-bottom: 10px; height: 14px;"></div>

        <div style="display:flex; justify-content:space-around;">
            <button onclick="submitWhisperName()" style="padding:10px 20px; cursor:pointer; background:#2e7d32; color:white; border:none; border-radius:5px; font-weight: bold;">決定</button>
            <button onclick="closeWhisperWindow()" style="padding:10px 20px; cursor:pointer; background:#444; color:white; border:none; border-radius:5px;">キャンセル</button>
        </div>
    </div>
</div>
<!-- ログイン画面 -->
<div id="login-overlay">
  <div class="login-card">
    <h2>冒険の準備</h2>
    
    <p style="color:#888; font-size:12px; margin-bottom:5px;">NAME / PASSWORD</p>
<input type="text" id="user-name-input" class="login-input" placeholder="NAME" maxlength="10">

<input type="password" id="user-pass-input" class="login-input" placeholder="****" autocomplete="new-password">
    
    <p style="color:#888; font-size:12px; margin-bottom:10px;">SELECT CHANNEL</p>
    <div class="ch-btn-grid">
      <button type="button" id="ch-btn-1" class="ch-btn active" onclick="selectChannel(1)">01</button>
      <button type="button" id="ch-btn-2" class="ch-btn" onclick="selectChannel(2)">02</button>
      <button type="button" id="ch-btn-3" class="ch-btn" onclick="selectChannel(3)">03</button>
      <button type="button" id="ch-btn-4" class="ch-btn" onclick="selectChannel(4)">04</button>
      <button type="button" id="ch-btn-5" class="ch-btn" onclick="selectChannel(5)">05</button>
    </div>

    <div id="login-error" style="color:#ff4444; font-size:12px; margin-bottom:10px;"></div>

    <div class="btn-group">
      <button id="start-game-btn" class="primary-btn">Login</button>
      <button id="register-btn" class="primary-btn" style="color:#ff80ff; border-color:#ff80ff;">Register</button>
    </div>
    
    <button onclick="joinAsGuest()" style="margin-top:20px; background:none; border:none; color:#666; cursor:pointer; text-decoration:underline;">ゲストで遊ぶ</button>
  </div>
</div>

<!-- ゲーム画面本体 -->
<div id="game-wrapper" style="position: relative; width: 800px; height: 600px;">
  <canvas id="stage" width="800" height="600" 
    style="position: absolute; top:0; left:0; z-index: 1; width: 800px; height: 600px;"></canvas>
  
  <canvas id="tooltip-layer" width="800" height="600" 
    style="position: absolute; top:0; left:0; z-index: 9999; 
           pointer-events: none; border: 2px solid yellow; 
           width: 800px; height: 600px; box-sizing: border-box;">
  </canvas>
</div>

<!-- 🏪 露店管理ウィンドウ（SHOPデザイン統合版） -->
<div id="vending-window" class="maple-window" style="
    display: none; 
    position: absolute; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    width: 320px; 
    padding: 0; 
    z-index: 10000; /* shop-overlay(9999)より手前に配置 */
    font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', sans-serif;">
    
    <!-- ヘッダー（SHOPと同じグラデーション） -->
    <div style="
        background: linear-gradient(to bottom, #bfcddb, #96a7b8); 
        border-bottom: 2px solid #777; 
        padding: 6px 12px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        border-radius: 4px 4px 0 0;">
        <span style="font-weight: bold; color: white; text-shadow: 1px 1px 1px rgba(0,0,0,0.5); font-size: 13px;">[露店管理] アイテムを並める</span>
        <button class="maple-btn" onclick="closeVendingMenu()" style="background: #ff6b6b; color: white; border-color: #c0392b; min-width: 24px;">✕</button>
    </div>
    
    <!-- コンテンツエリア -->
    <div style="padding: 15px; background: #efefef;">
        <p style="margin-top: 0; font-size: 12px; color: #666; margin-bottom: 10px;">🎒 インベントリから販売するアイテムを選択</p>
        
		<!-- 🌟 追加：店名入力欄 -->
    <div style="margin-bottom: 10px;">
        <label style="font-size: 11px; font-weight: bold; color: #444; display: block; margin-bottom: 4px;">露店の名前</label>
        <input type="text" id="vending-title-input" placeholder="いらっしゃいませ！" style="width: 100%; padding: 5px; border: 2px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 12px;">
    </div>
	
        <!-- アイテムリスト（SHOPのリスト背景を再現） -->
        <div id="vending-item-list" style="
            height: 120px; 
            background: white; 
            border: 2px inset #ddd; 
            border-radius: 4px;
            margin-bottom: 15px; 
            overflow-y: auto;
            background-image: radial-gradient(#eee 10%, transparent 10%); 
            background-size: 20px 20px;
            padding: 2px;">
            <!-- アイテム追加時にここへ挿入される -->
        </div>

        <!-- 価格入力（1行に収まるよう調整済み） -->
        <div style="display:none; margin-bottom: 15px;">
            <label style="font-size: 11px; font-weight: bold; color: #444; display: block; margin-bottom: 4px;">販売価格 (1個あたり)</label>
            <div style="
                background: #fff; 
                border: 2px solid #ddd; 
                border-radius: 4px; 
                padding: 3px 8px; 
                display: flex; 
                align-items: center; 
                justify-content: flex-end; /* 右寄せにする */
                box-shadow: inset 1px 1px 3px rgba(0,0,0,0.05);">
                
                <input type="number" id="vending-price" placeholder="0" style="
                    width: 100%; 
                    border: none; 
                    outline: none; 
                    text-align: right; 
                    font-family: 'Verdana', sans-serif; 
                    font-weight: bold; 
                    font-size: 14px; 
                    color: #333;
                    background: transparent;
                    margin-right: 4px;">
                
                <span style="
                    font-size: 11px; 
                    color: #666; 
                    font-weight: bold; 
                    white-space: nowrap; /* 💡 これで絶対に改行させない */
                    flex-shrink: 0;      /* 💡 文字が潰れるのを防ぐ */
                ">メル</span>
            </div>
        </div>

        <!-- 決定ボタン（SHOPのオレンジボタンを使用） -->
        <button id="vending-confirm-btn" class="maple-btn-orange" onclick="startVending()" style="width: 100%; font-size: 14px; cursor: pointer;">
            この内容で露店を開く
        </button>
    </div>

    <!-- フッター（SHOPと同じ装飾） -->
    <div style="background: #f0f0f0; border-top: 1px solid #ccc; padding: 6px 12px; border-radius: 0 0 6px 6px;">
        <span style="color: #e67e22; font-weight: bold; font-size: 11px;">※アイテムをクリックでリストから除外</span>
    </div>
</div>

<!-- 🏪 【修正版】他プレイヤーの露店表示ウィンドウ（管理窓とデザインを統一） -->
<div id="other-vending-window" class="maple-window" style="
    display: none; 
    position: absolute; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    width: 320px; 
    padding: 0; 
    z-index: 11000; 
    font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', sans-serif;">
    
    <!-- ヘッダー（管理窓と同じグラデーション） -->
    <div style="
        background: linear-gradient(to bottom, #bfcddb, #96a7b8); 
        border-bottom: 2px solid #777; 
        padding: 6px 12px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        border-radius: 4px 4px 0 0;">
        <span class="vending-title-display" style="font-weight: bold; color: white; text-shadow: 1px 1px 1px rgba(0,0,0,0.5); font-size: 13px;">露店名を表示中...</span>
        <button class="maple-btn" onclick="document.getElementById('other-vending-window').style.display='none'" style="background: #ff6b6b; color: white; border-color: #c0392b; min-width: 24px;">✕</button>
    </div>
    
    <!-- コンテンツエリア -->
    <div style="padding: 15px; background: #efefef;">
        <p style="margin-top: 0; font-size: 12px; color: #666; margin-bottom: 10px;">🛒 購入するアイテムを選択してください</p>
        
        <!-- 商品リスト（ドット背景・インセット枠） -->
        <div id="other-vending-items" style="
            height: 180px; 
            background: white; 
            border: 2px inset #ddd; 
            border-radius: 4px;
            margin-bottom: 15px; 
            overflow-y: auto;
            background-image: radial-gradient(#eee 10%, transparent 10%); 
            background-size: 20px 20px;
            padding: 2px;">
            <!-- 商品リストが動的に挿入される -->
            <p style="text-align: center; color: #888; font-size: 12px; margin-top: 20px;">商品を読み込み中...</p>
        </div>

        <!-- 決定ボタン（管理窓と同じオレンジボタン） -->
        <button id="vending-buy-btn" class="maple-btn-orange" style="width: 100%; font-size: 14px; cursor: pointer; display: none;">
            選択したアイテムを購入する
        </button>
    </div>

    <!-- フッター（所持金表示） -->
    <div style="background: #f0f0f0; border-top: 1px solid #ccc; padding: 8px 12px; border-radius: 0 0 6px 6px; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 11px; color: #666; font-weight: bold;">あなたの所持金:</span>
        <div style="text-align: right;">
            <span id="user-money-display" style="font-weight: bold; font-family: 'Verdana', sans-serif; font-size: 13px; color: #333;">-</span>
            <span style="font-size: 10px; margin-left: 2px; color: #666; font-weight: bold;">メル</span>
        </div>
    </div>
</div>

<style>
    /* 🌟 可愛らしさのポイント：丸ゴシック系フォントを優先 */
    #shop-overlay {
        font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Kosugi Maru', 'Meiryo', sans-serif;
        font-size: 12px;
        image-rendering: pixelated;
        user-select: none;
        color: #444; /* 真っ黒より少し柔らかい色に */
    }

    /* 商店の土台（角を少し丸く、影を柔らかく） */
    .maple-window {
        background: #fafafa;
        border: 2px solid #555; /* 枠線を少し太くしてクッキリ */
        border-radius: 6px;
        box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
    }

    /* ボタンをより「ぷっくり」させる */
    .maple-btn {
        background: linear-gradient(to bottom, #ffffff, #e0e0e0);
        border: 1px solid #999;
        border-radius: 4px;
        color: #555;
        cursor: pointer;
        font-size: 11px;
        padding: 3px 10px;
        box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset;
        font-weight: bold;
    }
    .maple-btn:hover { background: #f5f5f5; border-color: #777; }

    /* オレンジ色のボタンをより鮮やかに、可愛く */
    .maple-btn-orange {
        background: linear-gradient(to bottom, #ffea9e, #ffb821);
        border: 2px solid #d48e00;
        color: #5e4300;
        border-radius: 5px;
        font-weight: bold;
        padding: 4px 14px;
        text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
    }
    .maple-btn-orange:hover { filter: brightness(1.05); }

    /* スクロールバーも少し丸みを持たせる */
    #shop-overlay ::-webkit-scrollbar, 
    #vending-window ::-webkit-scrollbar,
    #other-vending-window ::-webkit-scrollbar { width: 14px; }
    
    #shop-overlay ::-webkit-scrollbar-track,
    #vending-window ::-webkit-scrollbar-track,
    #other-vending-window ::-webkit-scrollbar-track { background: #e8e4d8; border-left: 1px solid #bbb; }
    
    #shop-overlay ::-webkit-scrollbar-thumb,
    #vending-window ::-webkit-scrollbar-thumb,
    #other-vending-window ::-webkit-scrollbar-thumb { 
        background: #ccc4b4; 
        border: 2px solid #e8e4d8; 
        border-radius: 7px; 
    }
	
	/* アイテム行の基本：幅を100%に固定 */
.shop-item-row-div {
    display: flex;
    align-items: center;
    width: 100% !important; /* 強制的に幅いっぱいにする */
    box-sizing: border-box;  /* paddingを含めて100%にする */
    padding: 8px 12px;       /* 左右に少し余裕を持たせるとメイプルっぽいです */
    border-bottom: 1px solid #eee;
    background-color: #ffffff;
    cursor: pointer;
    user-select: none;
    transition: transform 0.05s;
    outline: none;
}

/* ホバーと選択のCSS */
.shop-item-row-div:hover {
    background-color: #f5f9ff !important;
    outline: 1px solid #a8caff !important;
    outline-offset: -1px;
}
.shop-item-row-div.selected {
    background-color: #e1efff !important;
    outline: 2px solid #7cb1ff !important;
    outline-offset: -2px;
}

/* 売却アイテム行の基本：ショップアイテムと構造を完全一致させる */
.sell-item-row-div {
    display: flex;
    align-items: center;
    width: 100% !important;
    box-sizing: border-box;
    padding: 8px 12px;
	border-bottom: 1px solid #eee;
    background-color: #ffffff; 
    cursor: pointer;
    user-select: none;
    transition: transform 0.05s;
    outline: none;
}

/* 売却ホバー：購入側の青系に対し、こちらは赤系で統一感を出す */
.sell-item-row-div:hover {
    background-color: #fff5f5 !important; /* ごく薄い赤 */
    outline: 1px solid #ffabab !important;
    outline-offset: -1px;
}

/* 売却選択：購入側の青に対し、こちらはメイプルらしいオレンジ系 */
.sell-item-row-div.selected {
    background-color: #fff0e5 !important; /* 薄いオレンジ */
    outline: 2px solid #ff7f50 !important;
    outline-offset: -2px;
}

</style>

<div id="shop-overlay" class="maple-window" style="display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 700px; padding: 0; z-index: 9999;">
    
    <div style="background: linear-gradient(to bottom, #bfcddb, #96a7b8); border-bottom: 2px solid #777; padding: 5px 12px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px 4px 0 0;">
        <span style="font-weight: bold; color: white; text-shadow: 1px 1px 1px rgba(0,0,0,0.5); font-size: 13px;">[SHOP] よろず屋にようこそ！</span>
        <button class="maple-btn" onclick="document.getElementById('shop-overlay').style.display='none'" style="background: #ff6b6b; color: white; border-color: #c0392b; min-width: 24px;">✕</button>
    </div>

    <div style="padding: 18px 10px; display: flex; background: #efefef; border-bottom: 1px solid #ccc;">
        <div style="width: 50%; display: flex; flex-direction: column; align-items: center; border-right: 2px dashed #ccc; gap: 10px;">
            <button class="maple-btn" onclick="document.getElementById('shop-overlay').style.display='none'">商店から出る</button>
            <button class="maple-btn-orange" style="font-size: 13px;">アイテムを買う</button>
        </div>
        <div style="width: 50%; display: flex; flex-direction: column; align-items: center; gap: 10px; padding-left: 10px;">
            <button class="maple-btn-orange" style="font-size: 13px;">アイテムを売る</button>
            <div style="background: #fff; border: 2px solid #ddd; border-radius: 4px; padding: 3px 12px; width: 170px; text-align: right; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.05);">
                <span id="shop-user-gold" style="font-weight: bold; font-family: 'Verdana', sans-serif; font-size: 14px; color: #333;">0</span>
                <span style="font-size: 11px; margin-left: 4px; color: #666; font-weight: bold;">メル</span>
            </div>
        </div>
    </div>

    <div style="display: flex; background: #ddd; padding: 2px; gap: 2px;">
        
        <div style="flex: 1; background: white; border-radius: 3px; overflow: hidden;">
            <div style="display: flex; background: #e8e4d8; padding: 3px 3px 0 3px;">
                <div style="background: #d34a4a; color: white; padding: 3px 15px; border-radius: 4px 4px 0 0; font-weight: bold; font-size: 11px;">全体</div>
            </div>
            <div id="shop-item-list" style="height: 275px; overflow-y: scroll; border-top: 2px solid #d34a4a; background-image: radial-gradient(#eee 10%, transparent 10%); background-size: 20px 20px;">
                </div>
        </div>

        <div style="flex: 1; background: #fffcf2; border-radius: 3px; overflow: hidden;">
            <div style="display: flex; background: #e8e4d8; padding: 3px 3px 0 3px;">
                <div style="background: #d34a4a; color: white; padding: 3px 15px; border-radius: 4px 4px 0 0; font-weight: bold; font-size: 11px;">全体</div>
                <div style="padding: 3px 15px; color: #888; font-size: 11px;">装備</div>
                <div style="padding: 3px 15px; color: #888; font-size: 11px;">消費</div>
                <div style="padding: 3px 15px; color: #888; font-size: 11px;">ETC</div>
            </div>
            <div id="user-sell-list" style="height: 275px; overflow-y: scroll; border-top: 2px solid #d34a4a; background-image: radial-gradient(#eee 10%, transparent 10%); background-size: 20px 20px;">
                </div>
        </div>
    </div>

    <div style="background: #f0f0f0; border-top: 1px solid #ccc; padding: 6px 12px; border-radius: 0 0 6px 6px;">
        <span style="display:none; color: #e67e22; font-weight: bold; font-size: 11px;">♪ 掘り出し物があるかもしれないよ！</span>
    </div>
</div>

<div id="custom-confirm" class="confirm-overlay" style="display: none;">
    <div class="confirm-box">
        <p id="confirm-message">このアイテムを購入しますか？</p>
        
        <div id="confirm-quantity-area" style="margin-bottom: 15px; text-align: center;">
            <label for="buy-quantity" style="font-size: 14px; margin-right: 5px;">個数:</label>
            <input type="number" id="buy-quantity" value="1" min="1" max="99" 
                style="width: 60px; padding: 5px; border-radius: 4px; border: 1px solid #444; background: #1e293b; color: white; text-align: center;">
        </div>

        <div class="confirm-buttons">
            <button id="confirm-no">いいえ</button>
            <button id="confirm-yes">はい</button>
        </div>
    </div>
</div>

<div id="sell-confirm" class="confirm-overlay" style="display: none;">
    <div class="confirm-box">
        <p id="sell-confirm-message">このアイテムを売却しますか？</p>
        <p id="sell-price-info" style="font-size: 0.9em; color: #ffd700;"></p> 
        
        <div id="sell-quantity-area" style="margin: 10px 0; text-align: center;">
            <label for="sell-quantity" style="font-size: 14px; margin-right: 5px; color: #94a3b8;">個数:</label>
            <input type="number" id="sell-quantity" value="1" min="1" 
                style="width: 60px; padding: 5px; border-radius: 4px; border: 1px solid #444; background: #1e293b; color: white; text-align: center;">
            <span id="sell-max-qty" style="font-size: 12px; color: #64748b; margin-left: 5px;"></span>
        </div>

        <div class="confirm-buttons">
            <button id="sell-confirm-no">いいえ</button>
            <button id="sell-confirm-yes" class="sell-btn">はい</button>
        </div>
    </div>
</div>

<div id="vending-notice-modal" style="display:none; position:fixed; top:30%; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:#fff; border:1px solid #ffcc00; padding:20px; z-index:11000; min-width:250px; text-align:center; border-radius:10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
    <p id="vending-notice-text" style="margin-bottom:15px; font-weight:bold;"></p>
    <button id="vending-notice-close-btn" style="padding:5px 20px; cursor:pointer; background:#444; color:#fff; border:1px solid #777; border-radius:4px;">閉じる</button>
</div>

<div id="vending-quantity-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.9); color:#fff; border:2px solid #888; padding:20px; z-index:10000; min-width:280px; border-radius:8px; box-shadow: 0 0 15px rgba(0,0,0,0.5); font-family: sans-serif;">
    <h3 id="modal-item-name" style="margin-top:0; color:#ffcc00; font-size:18px; border-bottom:1px solid #444; padding-bottom:10px;">アイテム名</h3>
    
    <div style="margin: 15px 0;">
        <label style="display:block; margin-bottom:5px;">出品する数 (所持: <span id="modal-max-quantity">0</span>)</label>
        <input type="number" id="modal-quantity-input" min="1" style="width:100%; padding:8px; box-sizing:border-box; background:#222; color:#fff; border:1px solid #555;">
    </div>

    <div style="margin: 15px 0;">
        <label style="display:block; margin-bottom:5px;">1個あたりの販売価格 (G)</label>
        <input type="number" id="modal-price-input" min="0" value="1000" style="width:100%; padding:8px; box-sizing:border-box; background:#222; color:#fff; border:1px solid #555;">
    </div>

    <div style="display:flex; justify-content: space-between; margin-top:20px;">
        <button id="modal-confirm-btn" style="flex:1; margin-right:5px; padding:10px; cursor:pointer; background:#2ecc71; color:white; border:none; font-weight:bold; border-radius:4px;">出品確定</button>
        <button id="modal-cancel-btn" style="flex:1; margin-left:5px; padding:10px; cursor:pointer; background:#e74c3c; color:white; border:none; font-weight:bold; border-radius:4px;">キャンセル</button>
    </div>
</div>

<!-- UI操作エリア -->
<div id="ui-container">
  <div class="chat-row">
    <select id="chat-mode" onchange="onChatModeChange()">
      <option value="all">全体</option>
      <option value="friend">友達</option>
      <option value="group">グループ</option>
      <option value="whisper">内緒話</option>
    </select>
    <input type="text" id="chat-in" placeholder="メッセージを入力してEnter...">
  </div>

  <div id="msg-box"></div>

  <div class="channel-box">
    <span style="font-size:12px; color:#666;">CH移動:</span>
    <button onclick="changeChannel(1)">CH.1</button>
    <button onclick="changeChannel(2)">CH.2</button>
    <button onclick="changeChannel(3)">CH.3</button>
    <button onclick="changeChannel(4)">CH.4</button>
    <button onclick="changeChannel(5)">CH.5</button>
  </div>
</div>

<!-- アイテムを捨てる時のポップアップ -->
<div id="drop-form" style="display:none;">
  <p id="drop-label"></p>
  <input type="number" id="drop-input" min="1" value="1" style="width:60px; text-align:center;">
  <p id="drop-error"></p>
  <button id="drop-confirm">捨てる</button>
  <button id="drop-cancel">やめる</button>
</div>
