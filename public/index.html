<script>
    (function() {
        // 🛡️ 1. 現在の環境がローカル（localhost / 127.0.0.1）かどうかを判定
        const isLocalHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

        // 📂 2. 環境に応じて、ベースとなるURL・パスを決定
        let BASE_PATH = '';
        let CSS_BASE_PATH = ''; // 🌟 CSS用のベースパスを新設

        if (isLocalHost) {
            // 💻 ローカル環境の場合：
            // 開いているURLが「http://localhost:3000/imglive/」なら '/imglive/' 基準に、
            // 「http://localhost:3000/」直下なら '/' 基準に自動で切り替えます。
            const hasImgLiveFolder = window.location.pathname.includes('/imglive');
            
            BASE_PATH = hasImgLiveFolder ? '/imglive/src/' : '/src/';
            CSS_BASE_PATH = hasImgLiveFolder ? '/imglive/src/' : '/src/'; // 🌟 ローカルのCSSパス
        } else {
            // 🌐 本番環境の場合：他のドメインに引っ張られないよう、imglive.net を直接指定
            BASE_PATH = 'https://imglive.net/src/';
            CSS_BASE_PATH = 'https://imglive.net/src/'; // 🌟 本番のCSSパス
        }

        // ========================================================
        // 🎨 [新設] CSSスタイルシートを環境に合わせて自動注入
        // ========================================================
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = CSS_BASE_PATH + 'layout.css';
        document.head.appendChild(link);
        console.log(`[CSS LOADER] 読み込んだスタイル: ${link.href}`);


        // 🖼️ 3. 読み込みたいスクリプトのリスト（順番を完全維持）
        const scripts = ['game.js', 'view.js', 'sound.js'];

        // 🚀 4. 順番通りにスクリプトタグを生成して注入
        scripts.forEach(srcFile => {
            const script = document.createElement('script');
            script.src = BASE_PATH + srcFile;
            script.async = false; // 👈 読み込み順序を絶対崩さない
            document.head.appendChild(script);
        });

        // 📢 デバッグログ：現在どちらのURLで読み込まれたかをコンソールで確認できます
        console.log(`[SCRIPT LOADER] 確定したベースパス: ${BASE_PATH}`);

        // ========================================================
        // 🏠 [追加] dialog.html を読み込んで body の最後に差し込む処理
        // ========================================================
        fetch(CSS_BASE_PATH + 'dialog.html')
            .then(response => {
                if (!response.ok) {
                    throw new Error('dialog.html の読み込みに失敗しました');
                }
                return response.text();
            })
            .then(html => {
                // divコンテナを作成して読み込んだHTMLを流し込む
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                // bodyの最後に追加
                document.body.appendChild(tempDiv);
                console.log('[HTML LOADER] dialog.html を読み込みました');
            })
            .catch(error => {
                console.error('[HTML LOADER] エラー:', error);
            });
    })();
</script>
