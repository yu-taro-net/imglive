<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>imglive - Adventure RPG</title>
  <script src="https://satisfied-nourishment-production.up.railway.app/socket.io/socket.io.js"></script>
  <style>
    /* --- 基本レイアウト --- */
    body {
      margin: 0;
      background-color: #020617;
      color: white;
      font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* --- ゲーム画面 (Canvas) --- */
    #stage {
      background-color: #1e293b;
      border: 4px solid #334155;
      border-radius: 12px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      width: 800px;
      height: 600px;
      cursor: crosshair;
    }

    /* --- UIコンテナ (チャット・操作系) --- */
    #ui-container {
      margin-top: 20px;
      width: 800px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-row {
      display: flex;
      gap: 8px;
    }

    #chat-mode {
      background: rgba(0,0,0,0.7);
      color: #60a5fa;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 5px;
      cursor: pointer;
    }

    #chat-in {
      flex-grow: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      outline: none;
      font-size: 14px;
    }

    #msg-box {
      height: 80px;
      overflow-y: auto;
      background: rgba(30, 41, 59, 0.5);
      padding: 10px;
      font-size: 13px;
      border-radius: 8px;
      border-left: 4px solid #60a5fa;
    }

    /* --- チャンネルボタン --- */
    .channel-box {
      margin-top: 10px;
      border-top: 1px solid #334155;
      padding-top: 10px;
    }
    
    .channel-box button {
      background: #1e293b;
      border: 1px solid #444;
      color: #ccc;
      padding: 5px 15px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 5px;
      transition: 0.2s;
    }

    .channel-box button:hover {
      background: #334155;
      color: white;
    }
	
	/* 現在のチャンネルボタンのスタイル */
.channel-box button.active {
    background-color: #fbbf24; /* メイプル風の黄色 */
    color: #000;
    font-weight: bold;
    border: 2px solid #d97706;
    box-shadow: 0 0 5px rgba(251, 191, 36, 0.8);
}

    /* --- ログインオーバーレイ (モーダル) --- */
    #login-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle, #222 0%, #050505 100%);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: rgba(30, 30, 30, 0.9);
      padding: 40px;
      border: 1px solid #333;
      border-radius: 15px;
      text-align: center;
      min-width: 320px;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
    }

    .login-card h2 {
      font-family: sans-serif;
      letter-spacing: 4px;
      color: #fff;
      text-shadow: 0 0 10px rgba(0,255,204,0.5);
      font-weight: lighter;
      margin-bottom: 30px;
    }

    .login-input {
      padding: 12px;
      font-size: 18px;
      border-radius: 5px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #fff;
      width: 220px;
      text-align: center;
      outline: none;
      margin-bottom: 15px;
      font-family: 'Courier New', monospace;
      transition: 0.3s;
    }

    .login-input:focus {
      border-color: #00ffcc;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
    }

    .ch-btn-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .ch-btn {
      background: rgba(30, 30, 30, 0.8);
      border: 1px solid #444;
      color: #888;
      padding: 10px 0;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
    }

    .ch-btn.active {
      border-color: #00ffcc;
      color: #00ffcc;
      background: rgba(0, 255, 204, 0.1);
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .primary-btn {
      flex: 1;
      padding: 12px;
      background: transparent;
      color: #00ffcc;
      border: 1px solid #00ffcc;
      border-radius: 5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .primary-btn:hover {
      background: rgba(0, 255, 204, 0.1);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
    }

    /* --- アイテムドロップ用フォーム --- */
    #drop-form {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 20px;
      border: 2px solid #fff;
      border-radius: 10px;
      z-index: 1000;
      text-align: center;
    }

    /* --- 装備中(Eマーク)用CSS (追加分) --- */
    .inventory-slot.equipped {
      border: 2px solid gold !important;
    }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-overlay">
  <div class="login-card">
    <h2>冒険の準備</h2>
    
    <p style="color:#888; font-size:12px; margin-bottom:5px;">NAME / PASSWORD</p>
    <input type="text" id="user-name-input" class="login-input" placeholder="NAME" maxlength="10">
    <input type="password" id="user-pass-input" class="login-input" placeholder="****">
    
    <p style="color:#888; font-size:12px; margin-bottom:10px;">SELECT CHANNEL</p>
    <div class="ch-btn-grid">
      <button type="button" id="ch-btn-1" class="ch-btn active" onclick="selectChannel(1)">01</button>
      <button type="button" id="ch-btn-2" class="ch-btn" onclick="selectChannel(2)">02</button>
      <button type="button" id="ch-btn-3" class="ch-btn" onclick="selectChannel(3)">03</button>
      <button type="button" id="ch-btn-4" class="ch-btn" onclick="selectChannel(4)">04</button>
      <button type="button" id="ch-btn-5" class="ch-btn" onclick="selectChannel(5)">05</button>
    </div>

    <div id="login-error" style="color:#ff4444; font-size:12px; margin-bottom:10px;"></div>

    <div class="btn-group">
      <button id="start-game-btn" class="primary-btn">Login</button>
      <button id="register-btn" class="primary-btn" style="color:#ff80ff; border-color:#ff80ff;">Register</button>
    </div>
    
    <button onclick="joinAsGuest()" style="margin-top:20px; background:none; border:none; color:#666; cursor:pointer; text-decoration:underline;">ゲストで遊ぶ</button>
  </div>
</div>

<!-- ゲーム画面本体 -->
<canvas id="stage" width="800" height="600"></canvas>

<!-- UI操作エリア -->
<div id="ui-container">
  <div class="chat-row">
    <select id="chat-mode" onchange="onChatModeChange()">
      <option value="all">全体</option>
      <option value="friend">友達</option>
      <option value="group">グループ</option>
      <option value="whisper">内緒話</option>
    </select>
    <input type="text" id="chat-in" placeholder="メッセージを入力してEnter...">
  </div>

  <div id="msg-box"></div>

  <div class="channel-box">
    <span style="font-size:12px; color:#666;">CH移動:</span>
    <button onclick="changeChannel(1)">CH.1</button>
    <button onclick="changeChannel(2)">CH.2</button>
    <button onclick="changeChannel(3)">CH.3</button>
    <button onclick="changeChannel(4)">CH.4</button>
    <button onclick="changeChannel(5)">CH.5</button>
  </div>
</div>

<!-- アイテムを捨てる時のポップアップ -->
<div id="drop-form" style="display:none;">
  <p id="drop-label"></p>
  <input type="number" id="drop-input" min="1" value="1" style="width:60px; text-align:center;">
  <p id="drop-error"></p>
  <button id="drop-confirm">捨てる</button>
  <button id="drop-cancel">やめる</button>
</div>

<!-- スクリプトの読み込み（元の順番を維持） -->
<script src="/src/game.js"></script>
<script src="/src/view.js"></script>
<script src="/src/sound.js"></script>

  };

</script>

</body>
</html>
